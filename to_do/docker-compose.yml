services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: to_do_backend
    ports:
     - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      CORS_ORIGINS: '["http://frontend:8501"]'
    depends_on:
      pg:
        condition: service_healthy

  pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: to_do
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
     - to_do_db:/var/lib/postgresql/data
    ports:
     - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: to_do_frontend
    ports:
     - "8080:8501"
    environment:
      API_URL: "http://backend:8000"
    depends_on:
      - backend

volumes:
  to_do_db:
